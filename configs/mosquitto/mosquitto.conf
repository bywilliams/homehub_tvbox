# =====================================
# HomeHub MQTT Broker
# =====================================

# Porta MQTT
listener 1883 0.0.0.0

# Exigir autenticação
allow_anonymous false

# Arquivo de usuários
password_file /data/data/com.termux/files/home/Homehub/configs/mosquitto/passwd

# Persistência
persistence true

# Local de persistência
persistence_location /data/data/com.termux/files/home/Homehub/storage/

# Salvar dados periodicamente
autosave_interval 60

# Logs
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
